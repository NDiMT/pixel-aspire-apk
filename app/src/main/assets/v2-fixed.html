;return o}function baseDeck(){var d=[];for(var i=0;i<5;i++)d.push(mk(pool[0]));for(i=0;i<4;i++)d.push(mk(pool[1]));d.push(mk(pool[5]));return d}function shuffle(a){var o=a.slice();for(var i=o.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1)),t=o[i];o[i]=o[j];o[j]=t}return o}function makeMap(act){var rows=act===3?10:9,lanes=5,nodes=[],edges=[];for(var r=0;r<rows;r++){var active=[],count=r===0?3:r===rows-1?1:rnd(3,4);while(active.length<count){var c=rnd(0,lanes-1);if(active.indexOf(c)<0)active.push(c)}active.sort(function(a,b){return a-b});for(var ai=0;ai<active.length;ai++){c=active[ai];var type='battle';if(r===rows-1)type='boss';else if(r>0&&r===rows-2)type='rest';else if(r>0){var x=Math.random();type=x<.48?'battle':x<.6?'elite':x<.73?'treasure':x<.86?'shop':'rest'}nodes.push({id:'a'+act+'r'+r+'c'+c,act:act,row:r,lane:c,type:type,x:12+c*19+rnd(-2,2),y:7+r*(86/(rows-1))+rnd(-1,1),available:r===0,done:false})}}function byRow(rr){return nodes.filter(function(n){return n.row===rr})}for(r=0;r<rows-1;r++){var from=byRow(r),to=byRow(r+1);from.forEach(function(f){var sorted=to.slice().sort(function(a,b){return Math.abs(a.lane-f.lane)-Math.abs(b.lane-f.lane)});var ct=r>rows-4?1:rnd(1,2);sorted.slice(0,ct).forEach(function(t){edges.push({from:f.id,to:t.id})})});to.forEach(function(t){if(!edges.some(function(e){return e.to===t.id})){var f=from.slice().sort(function(a,b){return Math.abs(a.lane-t.lane)-Math.abs(b.lane-t.lane)})[0];edges.push({from:f.id,to:t.id})}})}return{nodes:nodes,edges:edges,map:Object.fromEntries(nodes.map(function(n){return[n.id,n]}))}}function fresh(){return{screen:'start',act:1,map:makeMap(1),node:null,maxHp:72,hp:72,gold:0,deck:baseDeck(),enemy:null,draw:[],discard:[],hand:[],energy:3,block:0,str:0,burn:0,weak:0,reward:[],shop:[],logs:['Welcome, climber.'],busy:false,turn:1,hitHero:false,hitEnemy:false,audio:false}}var S=fresh(),AC=null,beat=null;function tone(f,d,t,v){if(!S.audio)return;try{AC=AC||new(window.AudioContext||window.webkitAudioContex  n.type==='boss'});if(boss&&boss.done){if(S.act>=3)S.screen='clear';else{S.act++;S.map=makeMap(S.act);S.node=null;S.screen='map';log('Act '+S.act+' begins.')}}else S.screen='map';render()}function enemyIntent(){var e=S.enemy;if(!e)return{label:''};var nd=S.map.map[S.node],base=nd.type==='boss'?18:nd.type==='elite'?13:9;if(S.turn%4===0&&['knight','warden','tyrant'].indexOf(e.kind)>=0)return{type:'block',amount:12,label:'Guards'};if(S.turn%3===0&&['slime','slimeboss','hydra'].indexOf(e.kind)>=0)return{type:'debuff',amount:1,label:'Debuffs'};var amt=Math.round(base*(1+(S.act-1)*.25));return{type:'attack',amount:amt,label:'Attacks '+amt}}function playCard(cardId){if(S.busy)return;var c=S.hand.find(function(x){return x.id===cardId});if(!c||S.energy<c.cost||!S.enemy)return;S.energy-=c.cost;S.hand=S.hand.filter(function(x){return x.id!==cardId});if(!c.exhaust)S.discard.push(c);var dmg=0;if(c.block)S.block+=c.block;if(c.heal)S.hp=Math.min(S.maxHp,S.hp+c.heal);if(c.str)S.str+=c.str;if(c.burn)S.burn+=c.burn;if(c.weak)S.weak+=c.weak;if(c.draw)draw(c.draw);if(c.dmg){dmg=(c.dmg+S.str)*(c.hits||1);S.enemy.hp=Math.max(0,S.enemy.hp-dmg);S.hitEnemy=true;tone(90,.08,'sawtooth',.06);setTimeout(function(){S.hitEnemy=false;render()},260)}tone(c.type==='attack'?330:260,.07);log(c.name+(dmg?' hits '+dmg:''));if(S.enemy.hp<=0)setTimeout(winCombat,260);render()}function winCombat(){if(!S.enemy)return;var gain=S.enemy.gold+rnd(4,10);S.gold+=gain;S.reward=shuffle(pool).slice(0,3).map(mk);S.enemy=null;S.busy=false;S.screen='reward';tone(523,.12);setTimeout(function(){tone(659,.12)},130);log('Victory! +'+gain+' gold.');render()}function endTurnAction(){if(S.busy||!S.enemy)return;S.busy=true;tone(180,.06);S.discard=S.discard.concat(S.hand);S.hand=[];if(S.burn>0){S.enemy.hp=Math.max(0,S.enemy.hp-S.burn);log('Burn deals '+S.burn+'.');S.burn=Math.max(0,S.burn-1);if(S.enemy.hp<=0){render();setTimeout(winCombat,260);return}}var it=enemyIntent();render();setTimeout(function(){if(!S.enemy)return;if(it.type==='attack'){var raw=S.weak?Math.floor(it.amount*.75):it.amount,hit=Math.max(0,raw-S.block);S.hp=Math.max(0,S.hp-hit);S.hitHero=true;tone(70,.1,'sawtooth',.07);log(S.enemy.name+' hits for '+hit+'.');setTimeout(function(){S.hitHero=false;render()},240);if(S.hp<=0){S.screen='dead';S.busy=false;render();return}}else if(it.type==='debuff'){S.weak++;log(S.enemy.name+' applies Weak.');tone(160,.1,'triangle')}else log(S.enemy.name+' guards.');S.weak=Math.max(0,S.weak-1);S.block=0;S.energy=3;S.turn++;draw(5);S.busy=false;render()},520)}function addReward(cardId){var c=S.reward.find(function(x){return x.id===cardId});if(c)S.deck.push(c);completeNode()}function buy(cardId){var c=S.shop.find(function(x){return x.id===cardId});if(!c||S.gold<c.price)return;S.gold-=c.price;S.deck.push(mk(c));S.shop=S.shop.filter(function(x){return x.id!==cardId});tone(440,.08);log('Bought '+c.name+'.');render()}function render(){hud();var m=q('#main');if(S.screen==='start'){m.innerHTML='<section class="start"><div class="panel">'+sprite('hero','float')+'<div class="logo">PIXEL<br>ASPIRE V2</div><p class="muted">Fixed mobile build: 3 acts, proper paths, 16-bit sprites, music and SFX.</p><button class="btn" data-action="start">Start Run</button></div></section>';return}if(S.screen==='map'){var lines=S.map.edges.map(function(e){var a=S.map.map[e.from],b=S.map.map[e.to],ok=a.done||a.available;return'<line x1="'+a.x+'" y1="'+(100-a.y)+'" x2="'+b.x+'" y2="'+(100-b.y)+'" stroke="'+(ok?'rgba(251,191,36,.52)':'rgba(148,163,184,.25)')+'" stroke-width="1.4"/>'}).join('');var nodes=S.map.nodes.map(function(n){return'<button class="node '+(n.available&&!n.done?'av ':'')+(n.done?'done ':'')+(!n.available&&!n.done?'lock ':'')+'" data-node="'+n.id+'" style="left:'+n.x+'%;top:'+(100-n.y)+'%" '+((!n.available||n.done)?'disabled':'')+'>'+icon(n.type)+'</button>'}).join('');m.innerHTML='<div class="panel"><b>Act '+S.act+': choose a path</b><p class="muted">Only glowing nodes are reachable.</p><div class="map"><svg viewBox="0 0 100 100" style="position:absolute;inset:0;width:100%;height:100%">'+lines+'</svg>'+nodes+'</div><div class="legend">'+['battle','elite','rest','treasure','shop','boss','done','reachable'].map(function(t){return'<div><span style="font-size:18px">'+(t==='done'?'✓':t==='reachable'?'◎':icon(t))+'</span><br>'+t+'</div>'}).join('')+'</div></div>';return}if(S.screen==='combat'&&S.enemy){var it=enemyIntent();m.innerHTML='<div class="battle"><div class="arena"><div class="units"><div class="unit '+(S.hitHero?'hit':'')+'">'+sprite('hero')+'<div class="bar"><i style="width:'+Math.max(0,S.hp/S.maxHp*100)+'%"></i></div><div class="stats">HP '+S.hp+'/'+S.maxHp+' · Block '+S.block+' · STR '+S.str+' · Weak '+S.weak+'</div></div><div class="unit enemy '+(S.hitEnemy?'hit':'')+'">'+sprite(S.enemy.kind)+'<b>'+S.enemy.name+'</b><div class="bar"><i style="width:'+Math.max(0,S.enemy.hp/S.enemy.maxHp*100)+'%"></i></div><div class="stats">HP '+S.enemy.hp+'/'+S.enemy.maxHp+' · Burn '+S.burn+'</div><div class="intent">Intent: '+it.label+'</div></div></div><div class="mini"><div>⚡ '+S.energy+'/3</div><div>Turn '+S.turn+'</div><div>Draw '+S.draw.length+'</div><div>Discard '+S.discard.length+'</div></div><div class="log">'+S.logs.map(function(x){return'<div>'+x+'</div>'}).join('')+'</div></div><div class="hand">'+S.hand.map(function(c){return card(c,S.energy<c.cost||S.busy)}).join('')+'</div><button class="btn" data-action="end" style="background:'+(S.busy?'#64748b':'#d946ef')+'" '+(S.busy?'disabled':'')+'>End Turn</button></div>';return}if(S.screen==='reward'){m.innerHTML='<div class="panel"><h2>Choose a card</h2><div class="cards">'+S.reward.map(function(c){return card(c,0)}).join('')+'</div><button class="btn2" data-action="skip">Skip</button></div>';return}if(S.screen==='rest'){m.innerHTML='<div class="panel" style="text-align:center"><h2>Rest Site 🔥</h2>'+sprite('hero','float')+'<p class="muted">Heal 30% max HP.</p><button class="btn" data-action="rest">Rest</button></div>';return}if(S.screen==='treasure'){m.innerHTML='<div class="panel" style="text-align:center"><h2>Treasure 💎</h2><p class="muted">Gain gold and continue.</p><button class="btn" data-action="treasure">Open Chest</button></div>';return}if(S.screen==='shop'){m.innerHTML='<div class="panel"><h2>Shop 🛒</h2><p class="muted">Tap a card to buy it.</p><div class="cards">'+S.shop.map(function(c){return'<div>'+card(c,0)+'<div style="text-align:center;font-weight:950;margin-top:6px">'+c.price+'g</div></div>'}).join('')+'</div><button class="btn2" data-action="leave">Leave</button></div>';return}if(S.screen==='dead'){m.innerHTML='<div class="panel dead"><h1>You Died</h1><p class="muted">Act '+S.act+'. Deck '+S.deck.length+'. Gold '+S.gold+'.</p><button class="btn" data-action="restart">New Run</button></div>';return}if(S.screen==='clear'){m.innerHTML='<div class="panel clear"><h1>3 Acts Cleared</h1><p class="muted">You beat Pixel Aspire V2.</p><button class="btn" data-action="restart">New Run</button></div>';return}}document.addEventListener('click',function(ev){var el=ev.target.closest('button');if(!el)return;var a=el.getAttribute('data-action');var node=el.getAttribute('data-node');var cid=el.getAttribute('data-card');if(a==='start'||a==='restart')startRun();else if(a==='audio')toggleAudio();else if(a==='end')endTurnAction();else if(a==='skip'||a==='leave')completeNode();else if(a==='rest'){S.hp=Math.min(S.maxHp,S.hp+Math.ceil(S.maxHp*.3));tone(300,.1);completeNode()}else if(a==='treasure'){var g=rnd(35,65);S.gold+=g;log('Found '+g+' gold.');tone(600,.1);completeNode()}else if(node)chooseNode(node);else if(cid){if(S.screen==='reward')addReward(cid);else if(S.screen==='shop')buy(cid);else playCard(cid)}});function tests(){var d=baseDeck();console.assert(d.length===10,'deck length');var mp=makeMap(1);console.assert(mp.nodes.some(function(n){return n.type==='boss'}),'boss exists');console.assert(typeof startRun==='function'&&typeof endTurnAction==='function','handlers exist')}tests();render();</script></body></html>
