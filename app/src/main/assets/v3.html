draw.shift())}S.hand=S.hand.slice(0,10)}function start(){var a=S.audio;S=fresh();S.audio=a;S.screen='map';log('Choose one of three paths.');render()}function startCombat(type){var raw=pick(enemies[type]),scale=1+(S.act-1)*.35;S.enemy={name:raw[0],kind:raw[1],hp:Math.round(raw[2]*scale),maxHp:Math.round(raw[2]*scale),gold:Math.round(raw[3]*scale),type:type};S.draw=sh(S.deck.map(mk));S.hand=[];S.discard=[];draw(5);S.energy=3;S.block=0;S.str=0;S.burn=0;S.weak=0;S.turn=1;S.busy=false;S.screen='combat';S.logs=[S.enemy.name+' appears!'];tone(110,.15);render()}function chooseNode(nid){var n=S.map.map[nid];if(!n||!n.available||n.done)return;S.node=nid;if(n.type==='battle'||n.type==='elite'||n.type==='boss')startCombat(n.type);else if(n.type==='shop'){S.shop=sh(cards).slice(0,5).map(function(c){var o=mk(c);o.price=o.rarity==='rare'?90:o.rarity==='uncommon'?65:45;return o});S.screen='shop';render()}else{S.screen=n.type;render()}}function complete(){var nid=S.node;if(!nid)return;var next=S.map.edges.filter(function(e){return e.from===nid}).map(function(e){return e.to});S.map.nodes=S.map.nodes.map(function(n){if(n.id===nid)n.done=true;if(next.indexOf(n.id)>=0)n.available=true;return n});S.map.map=Object.fromEntries(S.map.nodes.map(function(n){return[n.id,n]}));var boss=S.map.nodes.find(function(n){return n.type==='boss'});if(boss&&boss.done){if(S.act>=3)S.screen='clear';else{S.act++;S.map=makeMap(S.act);S.node=null;S.screen='map';log('Act '+S.act+' begins.')}}else S.screen='map';render()}function intent(){var e=S.enemy;if(!e)return{label:''};var nd=S.map.map[S.node],base=nd.type==='boss'?18:nd.type==='elite'?13:9;if(S.turn%4===0&&['knight','warden','tyrant'].indexOf(e.kind)>=0)return{type:'block',amount:12,label:'Guards'};if(S.turn%3===0&&['slime','slimeboss','hydra','mage'].indexOf(e.kind)>=0)return{type:'debuff',amount:1,label:'Debuffs'};var amt=Math.round(base*(1+(S.act-1)*.25));return{type:'attack',amount:amt,label:'Attacks '+amt}}function play(cid){if(S.busy)return;var c=S.hand.find(function(x){return x.id===cid});if(!c||S.energy<c.cost||!S.enemy)return;S.energy-=c.cost;S.hand=S.hand.filter(function(x){return x.id!==cid});if(!c.exhaust)S.discard.push(c);if(c.self)S.hp=Math.max(1,S.hp-c.self);var dmg=0;if(c.block)S.block+=c.block;if(c.heal)S.hp=Math.min(S.maxHp,S.hp+c.heal);if(c.str)S.str+=c.str;if(c.burn)S.burn+=c.burn;if(c.weak)S.weak+=c.weak;if(c.draw)draw(c.draw);if(c.dmg){dmg=(c.dmg+S.str)*(c.hits||1);S.enemy.hp=Math.max(0,S.enemy.hp-dmg);S.hitEnemy=true;tone(90,.08,'sawtooth',.06);setTimeout(function(){S.hitEnemy=false;render()},240)}tone(c.type==='attack'?330:260,.06);log(c.name+(dmg?' hits '+dmg:''));if(S.enemy.hp<=0)setTimeout(win,260);render()}function win(){if(!S.enemy)return;var gain=S.enemy.gold+rnd(4,10);S.gold+=gain;S.reward=sh(cards).slice(0,3).map(mk);S.enemy=null;S.busy=false;S.screen='reward';log('Victory! +'+gain+' gold.');tone(523,.12);render()}function endTurn(){if(S.busy||!S.enemy)return;S.busy=true;S.discard=S.discard.concat(S.hand);S.hand=[];if(S.burn>0){S.enemy.hp=Math.max(0,S.enemy.hp-S.burn);log('Burn deals '+S.burn+'.');S.burn=Math.max(0,S.burn-1);if(S.enemy.hp<=0){render();setTimeout(win,260);return}}var it=intent();render();setTimeout(function(){if(!S.enemy)return;if(it.type==='attack'){var raw=S.weak?Math.floor(it.amount*.75):it.amount,hit=Math.max(0,raw-S.block);S.hp=Math.max(0,S.hp-hit);S.hitHero=true;log(S.enemy.name+' hits for '+hit+'.');setTimeout(function(){S.hitHero=false;render()},220);if(S.hp<=0){S.screen='dead';S.busy=false;render();return}}else if(it.type==='debuff'){S.weak++;log(S.enemy.name+' applies Weak.')}else log(S.enemy.name+' guards.');S.weak=Math.max(0,S.weak-1);S.block=0;S.energy=3;S.turn++;draw(5);S.busy=false;render()},480)}function addReward(cid){var c=S.reward.find(function(x){return x.id===cid});if(c)S.deck.push(c);complete()}function buy(cid){var c=S.shop.find(function(x){return x.id===cid});if(!c||S.gold<c.price)return;S.gold-=c.price;S.deck.push(mk(c));S.shop=S.shop.filter(function(x){return x.id!==cid});log('Bought '+c.name+'.');render()}function render(){hud();var m=document.getElementById('main');if(S.screen==='start'){m.innerHTML='<section class="start"><div class="panel">'+sprite('hero','float')+'<div class="logo">PIXEL<br>ASPIRE V3</div><p class="muted">Indie-style mobile deckbuilder. 3 clear paths, 30+ cards, 3 acts, music and SFX.</p><button class="btn" data-action="start">Start Run</button></div></section>';return}if(S.screen==='map'){var lines=S.map.edges.map(function(e){var a=S.map.map[e.from],b=S.map.map[e.to],ok=a.done||a.available;return'<line x1="'+a.x+'" y1="'+(100-a.y)+'" x2="'+b.x+'" y2="'+(100-b.y)+'" stroke="'+(ok?'#d99a35':'#3b4351')+'" stroke-width="2.2" stroke-linecap="round"/>'}).join('');var nodes=S.map.nodes.map(function(n){return'<button class="node '+n.type+' '+(n.available&&!n.done?'av ':'')+(n.done?'done ':'')+(!n.available&&!n.done?'lock ':'')+'" data-node="'+n.id+'" style="left:'+n.x+'%;top:'+(100-n.y)+'%" '+((!n.available||n.done)?'disabled':'')+'>'+icon(n.type)+'</button>'}).join('');m.innerHTML='<div class="panel"><b>Act '+S.act+': choose your route</b><p class="muted">3 lanes. Clear lines. Each choice opens one or two connected next nodes.</p><div class="map"><svg viewBox="0 0 100 100" style="position:absolute;inset:0;width:100%;height:100%">'+lines+'</svg>'+nodes+'</div><div class="legend">'+['battle','elite','rest','treasure','shop','boss'].map(function(t){return'<div><b>'+icon(t)+'</b><br>'+t+'</div>'}).join('')+'</div></div>';return}if(S.screen==='combat'&&S.enemy){var it=intent();m.innerHTML='<div class="battle"><div class="arena"><div class="units"><div class="unit '+(S.hitHero?'hit':'')+'">'+sprite('hero')+'<div class="bar"><i style="width:'+Math.max(0,S.hp/S.maxHp*100)+'%"></i></div><div class="stats">HP '+S.hp+'/'+S.maxHp+' · Block '+S.block+' · STR '+S.str+' · Weak '+S.weak+'</div></div><div class="unit enemy '+(S.hitEnemy?'hit':'')+'">'+sprite(S.enemy.kind)+'<div class="name">'+S.enemy.name+'</div><div class="bar"><i style="width:'+Math.max(0,S.enemy.hp/S.enemy.maxHp*100)+'%"></i></div><div class="stats">HP '+S.enemy.hp+'/'+S.enemy.maxHp+' · Burn '+S.burn+'</div><div class="intent">Intent: '+it.label+'</div></div></div><div class="mini"><div>⚡ '+S.energy+'/3</div><div>Turn '+S.turn+'</div><div>Draw '+S.draw.length+'</div><div>Discard '+S.discard.length+'</div></div><div class="log">'+S.logs.map(function(x){return'<div>'+x+'</div>'}).join('')+'</div></div><div class="hand">'+S.hand.map(function(c){return card(c,S.energy<c.cost||S.busy)}).join('')+'</div><button class="btn" data-action="end" style="background:'+(S.busy?'#566070':'#b45ae0')+'" '+(S.busy?'disabled':'')+'>End Turn</button></div>';return}if(S.screen==='reward'){m.innerHTML='<div class="panel"><h2>Choose a card</h2><div class="cards">'+S.reward.map(function(c){return card(c,0)}).join('')+'</div><button class="btn2" data-action="skip">Skip</button></div>';return}if(S.screen==='rest'){m.innerHTML='<div class="panel" style="text-align:center"><h2>Rest Site 🔥</h2>'+sprite('hero','float')+'<p class="muted">Heal 30% max HP.</p><button class="btn" data-action="rest">Rest</button></div>';return}if(S.screen==='treasure'){m.innerHTML='<div class="panel" style="text-align:center"><h2>Treasure 💎</h2><p class="muted">Gain gold and continue.</p><button class="btn" data-action="treasure">Open Chest</button></div>';return}if(S.screen==='shop'){m.innerHTML='<div class="panel"><h2>Shop 🛒</h2><p class="muted">Tap a card to buy it.</p><div class="cards">'+S.shop.map(function(c){return'<div>'+card(c,0)+'<div style="text-align:center;font-weight:950;margin-top:6px">'+c.price+'g</div></div>'}).join('')+'</div><button class="btn2" data-action="leave">Leave</button></div>';return}if(S.screen==='dead'){m.innerHTML='<div class="panel dead"><h1>You Died</h1><p class="muted">Act '+S.act+'. Deck '+S.deck.length+'. Gold '+S.gold+'.</p><button class="btn" data-action="start">New Run</button></div>';return}if(S.screen==='clear'){m.innerHTML='<div class="panel clear"><h1>3 Acts Cleared</h1><p class="muted">You beat Pixel Aspire V3.</p><button class="btn" data-action="start">New Run</button></div>';return}}document.addEventListener('click',function(ev){var b=ev.target.closest('button');if(!b)return;var a=b.getAttribute('data-action'),n=b.getAttribute('data-node'),c=b.getAttribute('data-card');if(a==='start')start();else if(a==='audio')audio();else if(a==='end')endTurn();else if(a==='skip'||a==='leave')complete();else if(a==='rest'){S.hp=Math.min(S.maxHp,S.hp+Math.ceil(S.maxHp*.3));complete()}else if(a==='treasure'){var g=rnd(35,65);S.gold+=g;log('Found '+g+' gold.');complete()}else if(n)chooseNode(n);else if(c){if(S.screen==='reward')addReward(c);else if(S.screen==='shop')buy(c);else play(c)}});function tests(){console.assert(cards.length>=30,'30 cards');var m=makeMap(1);console.assert(m.nodes.filter(function(n){return n.row===0&&n.available}).length===3,'3 starts');console.assert(m.nodes.some(function(n){return n.type==='boss'}),'boss');console.assert(typeof endTurn==='function','end turn')}tests();render();</script></body></html>
