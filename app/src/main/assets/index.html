<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>Pixel Aspire</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;background:#020617;color:#fff;font-family:system-ui,-apple-system,Segoe UI,sans-serif;overflow:hidden;touch-action:manipulation}.app{min-height:100dvh;background:radial-gradient(circle at 50% 5%,rgba(99,102,241,.45),transparent 35%),linear-gradient(180deg,#111827,#020617);display:flex;flex-direction:column}.hud{padding:calc(10px + env(safe-area-inset-top)) 10px 10px;background:rgba(2,6,23,.82);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between;gap:8px;z-index:5}.title small{display:block;color:#94a3b8;font-size:10px;text-transform:uppercase;letter-spacing:1.4px}.title b{font-size:18px}.pills{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}.pill{border-radius:99px;padding:6px 9px;background:rgba(255,255,255,.08);font-size:12px;font-weight:800}.main{flex:1;overflow:auto;padding:12px 12px calc(12px + env(safe-area-inset-bottom));max-width:560px;width:100%;margin:0 auto}.panel{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.1);border-radius:24px;padding:14px;box-shadow:0 18px 45px rgba(0,0,0,.3)}button{font:inherit;color:inherit;border:0}.primary{width:100%;border-radius:18px;background:#fbbf24;color:#111827;font-weight:950;font-size:18px;padding:16px;box-shadow:0 12px 28px rgba(0,0,0,.28)}.secondary{width:100%;border-radius:16px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);font-weight:850;padding:14px}.start{min-height:calc(100dvh - 92px);display:grid;place-items:center;text-align:center}.logo{font-size:46px;line-height:.9;font-weight:950;margin:8px 0}.muted{color:#cbd5e1;font-size:14px;line-height:1.45}.mapbox{position:relative;height:570px;border-radius:22px;background:linear-gradient(180deg,rgba(30,41,59,.95),rgba(2,6,23,.96));overflow:hidden}.node{position:absolute;width:48px;height:48px;border-radius:99px;transform:translate(-50%,-50%);display:grid;place-items:center;font-size:22px;background:#0f172a;border:1px solid rgba(255,255,255,.16);box-shadow:0 10px 22px rgba(0,0,0,.28)}.node.available{background:rgba(59,130,246,.35);border-color:rgba(147,197,253,.8)}.node.done{background:rgba(16,185,129,.35);border-color:rgba(110,231,183,.85)}.node:disabled{color:#64748b}.legend{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.legend div{background:rgba(255,255,255,.06);border-radius:14px;padding:8px;text-align:center;font-size:12px}.battleTop{display:grid;grid-template-columns:1fr 1fr;gap:12px;align-items:end}.unit{text-align:center}.hpbar{height:11px;border-radius:99px;overflow:hidden;background:rgba(0,0,0,.35);margin-top:8px}.hpbar span{display:block;height:100%;background:#ef4444}.enemy .hpbar span{background:#d946ef}.stats{font-size:12px;color:#cbd5e1;margin-top:6px}.intent{display:inline-block;margin-top:8px;padding:6px 10px;border-radius:99px;background:rgba(0,0,0,.35);font-size:12px;font-weight:850}.minirow{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.minirow div{background:rgba(255,255,255,.07);border-radius:14px;padding:9px;text-align:center;font-size:12px;font-weight:850}.log{margin-top:10px;background:rgba(0,0,0,.25);border-radius:16px;min-height:76px;padding:10px;color:#cbd5e1;font-size:12px;line-height:1.45}.hand{display:flex;gap:10px;overflow-x:auto;padding:12px 2px 8px;margin-top:auto;scroll-snap-type:x mandatory}.card{min-width:148px;max-width:148px;scroll-snap-align:start;border-radius:18px;background:#0f172a;border:1px solid rgba(251,191,36,.72);padding:10px;text-align:left;box-shadow:0 12px 28px rgba(0,0,0,.34)}.card.disabled{opacity:.48;border-color:rgba(255,255,255,.12)}.cardHead{display:flex;justify-content:space-between;gap:7px;align-items:center}.cardName{font-size:14px;font-weight:950}.cost{width:28px;height:28px;border-radius:99px;background:#fbbf24;color:#111827;display:grid;place-items:center;font-weight:950;flex:0 0 auto}.art{height:68px;margin-top:8px;border-radius:13px;border:1px solid rgba(255,255,255,.1);display:grid;place-items:center;font-size:30px;background:linear-gradient(135deg,#ef4444,#111827)}.skill .art{background:linear-gradient(135deg,#3b82f6,#111827)}.power .art{background:linear-gradient(135deg,#a855f7,#111827)}.cardText{min-height:45px;margin-top:8px;color:#cbd5e1;font-size:12px;line-height:1.3}.rarity{font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin-top:6px}.rewardCards,.shopCards{display:flex;gap:10px;overflow-x:auto;padding-bottom:8px}.sprite{width:132px;height:132px;margin:0 auto;position:relative;filter:drop-shadow(0 12px 0 rgba(0,0,0,.25))}.sprite:before{content:"";position:absolute;inset:0;border-radius:999px;background:var(--glow,#facc15);filter:blur(20px);opacity:.35}.sprite svg{position:relative;width:100%;height:100%}.dead{background:rgba(127,29,29,.33);border-color:rgba(248,113,113,.32);text-align:center}.actclear{background:rgba(16,185,129,.14);border-color:rgba(16,185,129,.28);text-align:center}@media(max-height:700px){.sprite{width:112px;height:112px}.mapbox{height:500px}.logo{font-size:40px}.card{min-width:138px;max-width:138px}.art{height:58px}}
</style>
</head>
<body>
<div class="app">
  <div class="hud"><div class="title"><small>Pixel Aspire</small><b id="screenTitle">Start</b></div><div class="pills"><div class="pill" id="hpPill">❤ 72/72</div><div class="pill" id="goldPill">💰 0</div><div class="pill" id="deckPill">🃏 10</div></div></div>
  <main class="main" id="main"></main>
</div>
<script>
const $=s=>document.querySelector(s);const rand=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;const pick=a=>a[Math.floor(Math.random()*a.length)];const uid=()=>Math.random().toString(36).slice(2,10);const copy=o=>JSON.parse(JSON.stringify(o));
const CARD_POOL=[{key:'strike',name:'Strike',type:'attack',cost:1,text:'Deal 6 damage.',dmg:6,rarity:'common'},{key:'defend',name:'Defend',type:'skill',cost:1,text:'Gain 5 block.',block:5,rarity:'common'},{key:'quick',name:'Quick Jab',type:'attack',cost:1,text:'Deal 4 damage. Draw 1.',dmg:4,draw:1,rarity:'common'},{key:'ember',name:'Ember Slash',type:'attack',cost:1,text:'Deal 5 damage. Apply 2 burn.',dmg:5,burn:2,rarity:'common'},{key:'brace',name:'Brace',type:'skill',cost:0,text:'Gain 3 block.',block:3,rarity:'common'},{key:'bash',name:'Bash',type:'attack',cost:2,text:'Deal 10 damage. Apply weak.',dmg:10,weak:1,rarity:'uncommon'},{key:'barrier',name:'Barrier',type:'skill',cost:2,text:'Gain 12 block.',block:12,rarity:'uncommon'},{key:'daggers',name:'Twin Daggers',type:'attack',cost:1,text:'Deal 3 damage twice.',dmg:3,hits:2,rarity:'uncommon'},{key:'ritual',name:'Ritual',type:'power',cost:1,text:'Gain 1 strength.',str:1,rarity:'rare'},{key:'nova',name:'Nova',type:'attack',cost:3,text:'Deal 20 damage.',dmg:20,rarity:'rare'},{key:'tea',name:'Herbal Tea',type:'skill',cost:1,text:'Heal 5. Exhaust.',heal:5,exhaust:true,rarity:'rare'}];
const ENEMY_POOL={battle:[{name:'Goblin Byte',kind:'goblin',hp:30,gold:12},{name:'Ash Bat',kind:'bat',hp:26,gold:10},{name:'Crystal Slime',kind:'slime',hp:34,gold:12},{name:'Mask Bandit',kind:'bandit',hp:36,gold:14}],elite:[{name:'Iron Knight',kind:'knight',hp:58,gold:28},{name:'Bone Captain',kind:'bone',hp:60,gold:30},{name:'Slime Titan',kind:'slimeboss',hp:68,gold:32}],boss:[{name:'Neon Warden',kind:'warden',hp:125,gold:80}]};
function makeCard(c){return {...c,id:uid()}}function baseDeck(){return [...Array.from({length:5},()=>makeCard(CARD_POOL[0])),...Array.from({length:4},()=>makeCard(CARD_POOL[1])),makeCard(CARD_POOL[5])]}function shuffle(a){let o=[...a];for(let i=o.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]]}return o}
function tests(){let d=baseDeck();console.assert(d.length===10,'baseDeck length');console.assert(d.every(c=>c.id),'cards ids');console.assert(shuffle(d).length===d.length,'shuffle length');console.assert(CARD_POOL.some(c=>c.key==='strike'),'strike exists')}
function makeMap(){let rows=8,cols=4,levels=[];for(let r=0;r<rows;r++){let ns=[];for(let c=0;c<cols;c++){let t='battle';if(r===rows-1)t='boss';else if(r>0){let x=Math.random();t=x<.48?'battle':x<.63?'rest':x<.76?'treasure':x<.9?'shop':'elite'}ns.push({id:`r${r}c${c}`,row:r,col:c,type:t,x:((c+.5)/cols)*100,y:((r+.5)/rows)*100,completed:false,available:r===0})}levels.push(ns)}let nodes=levels.flat(),nodeMap=Object.fromEntries(nodes.map(n=>[n.id,n])),edges=[];for(let r=0;r<rows-1;r++){for(let c=0;c<cols;c++){let possible=[c-1,c,c+1].filter(v=>v>=0&&v<cols),count=r===rows-2?1:rand(1,2);shuffle(possible).slice(0,count).forEach(nc=>edges.push({from:levels[r][c].id,to:levels[r+1][nc].id}))}}return{nodes,edges,nodeMap}}
let S={screen:'start',map:makeMap(),current:null,maxHp:72,hp:72,gold:0,deck:baseDeck(),enemy:null,draw:[],discard:[],hand:[],energy:3,block:0,str:0,burn:0,weak:0,reward:[],shop:[],logs:['Welcome to the spire.']};
function icon(t){return{battle:'⚔',elite:'☠',rest:'🔥',treasure:'💎',shop:'🛒',boss:'👑'}[t]||'•'}function log(m){S.logs=[m,...S.logs].slice(0,6)}function setScreen(s){S.screen=s;render()}function updateHud(){screenTitle.textContent=S.screen[0].toUpperCase()+S.screen.slice(1);hpPill.textContent=`❤ ${S.hp}/${S.maxHp}`;goldPill.textContent=`💰 ${S.gold}`;deckPill.textContent=`🃏 ${S.deck.length}`}
const maps={hero:[[4,0,1],[5,0,1],[3,1,1],[4,1,1],[5,1,1],[6,1,1],[3,2,1],[4,2,2],[5,2,2],[6,2,1],[2,3,1],[3,3,1],[4,3,3],[5,3,3],[6,3,1],[7,3,1],[2,4,1],[3,4,1],[4,4,1],[5,4,1],[6,4,1],[7,4,1],[3,5,4],[4,5,4],[5,5,4],[6,5,4],[3,6,1],[4,6,1],[5,6,1],[6,6,1],[2,7,1],[3,7,1],[4,7,1],[5,7,1],[6,7,1],[7,7,1],[2,8,1],[4,8,1],[5,8,1],[7,8,1],[2,9,1],[7,9,1],[1,7,4],[8,7,4]],slime:[[3,3,1],[4,2,1],[5,2,1],[6,2,1],[7,3,1],[2,4,1],[3,4,1],[4,4,1],[5,4,1],[6,4,1],[7,4,1],[8,4,1],[2,5,1],[3,5,3],[4,5,1],[5,5,1],[6,5,3],[7,5,1],[8,5,1],[2,6,1],[3,6,1],[4,6,1],[5,6,1],[6,6,1],[7,6,1],[8,6,1],[3,7,1],[4,7,1],[5,7,4],[6,7,1],[7,7,1]],bat:[[0,3,1],[1,2,1],[2,2,1],[3,3,1],[8,3,1],[9,2,1],[10,2,1],[11,3,1],[3,4,1],[4,4,1],[5,4,1],[6,4,1],[7,4,1],[8,4,1],[4,5,1],[5,5,3],[6,5,3],[7,5,1],[5,6,1],[6,6,1]]};
function sprite(kind){let pal={hero:['#facc15','#7c2d12','#fef3c7','#fb7185'],goblin:['#84cc16','#166534','#ecfccb','#f97316'],bat:['#a78bfa','#4c1d95','#ddd6fe','#111827'],slime:['#22d3ee','#0e7490','#ecfeff','#a7f3d0'],bandit:['#94a3b8','#1e293b','#e2e8f0','#f43f5e'],knight:['#94a3b8','#334155','#e2e8f0','#f43f5e'],bone:['#fef3c7','#78350f','#fff7ed','#dc2626'],slimeboss:['#67e8f9','#155e75','#ecfeff','#bef264'],warden:['#f0abfc','#701a75','#fdf4ff','#f97316']}[kind]||['#fff','#333','#ddd','#f00'];let px=maps[kind]||maps.slime;if(['goblin','bandit','knight','bone','warden','slimeboss'].includes(kind))px=maps.hero;let rects=px.map(([x,y,i])=>`<rect x="${x*10}" y="${y*10}" width="10" height="10" fill="${pal[i-1]}"/>`).join('');return`<div class="sprite" style="--glow:${pal[0]}"><svg viewBox="0 0 120 120" shape-rendering="crispEdges">${rects}</svg></div>`}
function cardHtml(c,disabled=false){return`<button class="card ${c.type} ${disabled?'disabled':''}" data-card="${c.id}"><div class="cardHead"><div class="cardName">${c.name}</div><div class="cost">${c.cost}</div></div><div class="art">${c.type==='attack'?'⚔':c.type==='skill'?'🛡':'✦'}</div><div class="cardText">${c.text}</div><div class="rarity">${c.rarity} · ${c.type}</div></button>`}
function startRun(){S={screen:'map',map:makeMap(),current:null,maxHp:72,hp:72,gold:0,deck:baseDeck(),enemy:null,draw:[],discard:[],hand:[],energy:3,block:0,str:0,burn:0,weak:0,reward:[],shop:[],logs:['Choose your first path.']};render()}
function connected(id){return S.map.edges.filter(e=>e.from===id).map(e=>e.to)}function completeNode(){let id=S.current;if(!id)return;let next=connected(id);S.map.nodes=S.map.nodes.map(n=>n.id===id?{...n,completed:true}:next.includes(n.id)?{...n,available:true}:n);S.map.nodeMap=Object.fromEntries(S.map.nodes.map(n=>[n.id,n]));S.screen='map';render()}
function chooseNode(id){let n=S.map.nodeMap[id];if(!n.available||n.completed)return;S.current=id;if(['battle','elite','boss'].includes(n.type))startCombat(n.type);else if(n.type==='shop'){S.shop=shuffle(CARD_POOL).slice(0,3).map(c=>({...makeCard(c),price:c.rarity==='rare'?90:c.rarity==='uncommon'?65:45}));setScreen('shop')}else setScreen(n.type)}
function startCombat(type){let d=copy(pick(ENEMY_POOL[type]));d.maxHp=d.hp;let pile=shuffle(S.deck.map(c=>({...c,id:uid()})));S.enemy=d;S.draw=pile;S.hand=S.draw.splice(0,5);S.discard=[];S.energy=3;S.block=0;S.str=0;S.burn=0;S.weak=0;S.screen='combat';S.logs=[`${d.name} appears!`];render()}
function drawCards(n){for(let i=0;i<n;i++){if(!S.draw.length&&S.discard.length){S.draw=shuffle(S.discard);S.discard=[]}if(!S.draw.length)break;S.hand.push(S.draw.shift())}S.hand=S.hand.slice(0,10)}function intent(){let e=S.enemy;if(!e)return{label:''};if(['knight','warden'].includes(e.kind)&&e.hp%3===0)return{type:'block',amount:10,label:'Blocks 10'};if(['slime','slimeboss'].includes(e.kind)&&e.hp%4===0)return{type:'debuff',amount:1,label:'Weakens'};let amt=S.map.nodeMap[S.current]?.type==='boss'?18:S.map.nodeMap[S.current]?.type==='elite'?13:9;return{type:'attack',amount:amt,label:`Attacks ${amt}`}}
function playCard(id){let c=S.hand.find(x=>x.id===id);if(!c||S.energy<c.cost||!S.enemy)return;S.energy-=c.cost;S.hand=S.hand.filter(x=>x.id!==id);if(!c.exhaust)S.discard.push(c);let dmg=0;if(c.block)S.block+=c.block;if(c.heal)S.hp=Math.min(S.maxHp,S.hp+c.heal);if(c.str)S.str+=c.str;if(c.burn)S.burn+=c.burn;if(c.weak)S.weak+=c.weak;if(c.draw)drawCards(c.draw);if(c.dmg){dmg=(c.dmg+S.str)*(c.hits||1);S.enemy.hp=Math.max(0,S.enemy.hp-dmg);if(S.enemy.hp<=0){setTimeout(finishCombat,220)}}log(`${c.name}${dmg?' deals '+dmg:''}.`);render()}
function finishCombat(){if(!S.enemy)return;let gain=S.enemy.gold+rand(3,8);S.gold+=gain;S.reward=shuffle(CARD_POOL).slice(0,3).map(makeCard);S.screen='combatReward';log(`Victory! +${gain} gold.`);render()}
function endTurn(){if(!S.enemy)return;S.discard.push(...S.hand);S.hand=[];if(S.burn>0){S.enemy.hp=Math.max(0,S.enemy.hp-S.burn);log(`Burn deals ${S.burn}.`);S.burn=Math.max(0,S.burn-1);if(S.enemy.hp<=0){setTimeout(finishCombat,220);render();return}}let it=intent();setTimeout(()=>{if(it.type==='attack'){let raw=S.weak?Math.floor(it.amount*.75):it.amount;let hit=Math.max(0,raw-S.block);S.hp=Math.max(0,S.hp-hit);log(`${S.enemy.name} hits for ${hit}.`);if(S.hp<=0){S.screen='dead';render();return}}else if(it.type==='debuff'){S.weak++;log(`${S.enemy.name} weakens you.`)}else log(`${S.enemy.name} braces.`);S.weak=Math.max(0,S.weak-1);S.block=0;S.energy=3;drawCards(5);render()},380);render()}
function reward(id){let c=S.reward.find(x=>x.id===id);if(c)S.deck.push(c);completeNode()}function buy(id){let c=S.shop.find(x=>x.id===id);if(!c||S.gold<c.price)return;S.gold-=c.price;S.deck.push({...c,id:uid()});S.shop=S.shop.filter(x=>x.id!==id);log(`Bought ${c.name}.`);render()}
function render(){updateHud();let m=$('#main');if(S.screen==='start'){m.innerHTML=`<section class="start"><div class="panel">${sprite('hero')}<div class="logo">PIXEL<br>ASPIRE</div><p class="muted">Mobile roguelike deckbuilder με path map, battles, elites, shops, rests, treasure και boss.</p><button class="primary" id="startBtn">Start Run</button></div></section>`;startBtn.onclick=startRun;return}if(S.screen==='map'){let boss=S.map.nodes.find(n=>n.type==='boss');if(boss&&boss.completed){m.innerHTML=`<div class="panel actclear"><h2>Act Cleared</h2><p class="muted">You beat the boss.</p><button class="primary" id="newRun">New Run</button></div>`;newRun.onclick=startRun;return}let lines=S.map.edges.map(e=>{let a=S.map.nodeMap[e.from],b=S.map.nodeMap[e.to];return`<line x1="${a.x}" y1="${100-a.y}" x2="${b.x}" y2="${100-b.y}" stroke="rgba(148,163,184,.36)" stroke-width="1.4"/>`}).join('');let nodes=S.map.nodes.map(n=>`<button class="node ${n.available&&!n.completed?'available':''} ${n.completed?'done':''}" data-node="${n.id}" style="left:${n.x}%;top:${100-n.y}%" ${(!n.available||n.completed)?'disabled':''}>${icon(n.type)}</button>`).join('');m.innerHTML=`<div class="panel"><b>Choose next node</b><p class="muted">Διαλέγεις μόνο διαθέσιμους κόμβους πάνω στα connected paths.</p><div class="mapbox"><svg viewBox="0 0 100 100" style="position:absolute;inset:0;width:100%;height:100%">${lines}</svg>${nodes}</div><div class="legend">${['battle','elite','rest','treasure','shop','boss'].map(t=>`<div><span style="font-size:18px">${icon(t)}</span><br>${t}</div>`).join('')}</div></div>`;document.querySelectorAll('[data-node]').forEach(b=>b.onclick=()=>chooseNode(b.dataset.node));return}if(S.screen==='combat'&&S.enemy){let it=intent();m.innerHTML=`<div style="display:flex;flex-direction:column;min-height:calc(100dvh - 108px)"><div class="panel"><div class="battleTop"><div class="unit">${sprite('hero')}<div class="hpbar"><span style="width:${S.hp/S.maxHp*100}%"></span></div><div class="stats">HP ${S.hp}/${S.maxHp} · Block ${S.block} · STR ${S.str}</div></div><div class="unit enemy">${sprite(S.enemy.kind)}<b>${S.enemy.name}</b><div class="hpbar"><span style="width:${S.enemy.hp/S.enemy.maxHp*100}%"></span></div><div class="stats">HP ${S.enemy.hp}/${S.enemy.maxHp} · Burn ${S.burn}</div><div class="intent">Intent: ${it.label}</div></div></div><div class="minirow"><div>⚡ ${S.energy}/3</div><div>Draw ${S.draw.length}</div><div>Discard ${S.discard.length}</div></div><div class="log">${S.logs.map(x=>`<div>${x}</div>`).join('')}</div></div><div class="hand">${S.hand.map(c=>cardHtml(c,S.energy<c.cost)).join('')}</div><button class="primary" id="endTurn" style="background:#d946ef">End Turn</button></div>`;document.querySelectorAll('[data-card]').forEach(b=>b.onclick=()=>playCard(b.dataset.card));endTurn.onclick=endTurn;return}if(S.screen==='combatReward'){m.innerHTML=`<div class="panel"><h2>Choose a card reward</h2><div class="rewardCards">${S.reward.map(c=>cardHtml(c,false)).join('')}</div><button class="secondary" id="skip">Skip</button></div>`;document.querySelectorAll('[data-card]').forEach(b=>b.onclick=()=>reward(b.dataset.card));skip.onclick=()=>completeNode();return}if(S.screen==='rest'){m.innerHTML=`<div class="panel" style="text-align:center"><h2>Rest Site 🔥</h2><p class="muted">Recover HP before continuing.</p><button class="primary" id="rest">Heal 20 HP</button></div>`;rest.onclick=()=>{S.hp=Math.min(S.maxHp,S.hp+20);log('You rest and recover.');completeNode()};return}if(S.screen==='treasure'){m.innerHTML=`<div class="panel" style="text-align:center"><h2>Treasure 💎</h2><p class="muted">Open the chest and take the gold.</p><button class="primary" id="chest">Open Chest</button></div>`;chest.onclick=()=>{let g=rand(25,45);S.gold+=g;log(`Found ${g} gold.`);completeNode()};return}if(S.screen==='shop'){m.innerHTML=`<div class="panel"><h2>Shop 🛒</h2><p class="muted">Buy a card or leave.</p><div class="shopCards">${S.shop.map(c=>`<div>${cardHtml(c,false)}<div style="text-align:center;font-weight:900;margin-top:6px">${c.price} gold</div></div>`).join('')}</div><button class="secondary" id="leave">Leave Shop</button></div>`;document.querySelectorAll('[data-card]').forEach(b=>b.onclick=()=>buy(b.dataset.card));leave.onclick=completeNode;return}if(S.screen==='dead'){m.innerHTML=`<div class="panel dead"><h1>You Died</h1><p class="muted">Try another run.</p><button class="primary" id="again">New Run</button></div>`;again.onclick=startRun;return}}
tests();render();
</script>
</body>
</html>
