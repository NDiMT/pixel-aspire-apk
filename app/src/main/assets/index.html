function mk(c){return{...c,id:ID()}}function baseDeck(){return[...Array.from({length:5},()=>mk(cards[0])),...Array.from({length:4},()=>mk(cards[1])),mk(cards[5])]}function sh(a){let o=[...a];for(let i=o.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[o[i],o[j]]=[o[j],o[i]]}return o}
function makeMap(act){let rows=act===3?10:9,lanes=5,nodes=[],edges=[];for(let r=0;r<rows;r++){let active=[];let count=r===0?3:r===rows-1?1:R(3,4);while(active.length<count){let c=R(0,lanes-1);if(!active.includes(c))active.push(c)}active.sort((a,b)=>a-b);active.forEach((c,i)=>{let type='battle';if(r===rows-1)type='boss';else if(r===0)type='battle';else if(r===rows-2)type='rest';else{let x=Math.random();type=x<.48?'battle':x<.6?'elite':x<.73?'treasure':x<.86?'shop':'rest'}nodes.push({id:`a${act}r${r}c${c}`,act,row:r,lane:c,type,x:12+c*19+R(-2,2),y:7+r*(86/(rows-1))+R(-1,1),available:r===0,done:false})})}let byRow=r=>nodes.filter(n=>n.row===r);for(let r=0;r<rows-1;r++){let from=byRow(r),to=byRow(r+1);from.forEach(f=>{let sorted=[...to].sort((a,b)=>Math.abs(a.lane-f.lane)-Math.abs(b.lane-f.lane));let count=r>rows-4?1:R(1,2);sorted.slice(0,count).forEach(t=>edges.push({from:f.id,to:t.id}))});to.forEach(t=>{if(!edges.some(e=>e.to===t.id)){let f=[...from].sort((a,b)=>Math.abs(a.lane-t.lane)-Math.abs(b.lane-t.lane))[0];edges.push({from:f.id,to:t.id})}})}return{nodes,edges,map:Object.fromEntries(nodes.map(n=>[n.id,n]))}}

let AC=null,beat=null;function tone(freq,dur=.08,type='square',vol=.05){if(!S.audio)return;AC=AC||new(window.AudioContext||window.webkitAudioContext)();let o=AC.createOscillator(),g=AC.createGain();o.type=type;o.frequency.value=freq;g.gain.setValueAtTime(.0001,AC.currentTime);g.gain.exponentialRampToValueAtTime(vol,AC.currentTime+.01);g.gain.exponentialRampToValueAtTime(.0001,AC.currentTime+dur);o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur+.02)}function music(on){S.audio=on;if(beat)clearInterval(beat);audioBtn.textContent=on?'♪ ON':'♪ OFF';if(!on)return;AC=AC||new(window.AudioContext||window.webkitAudioContext)();AC.resume();let seq=[146,174,196,220,196,174,164,130],i=0;beat=setInterval(()=>{tone(seq[i++%seq.length],.18,'square',.035);if(i%4===0)tone(seq[(i+2)%seq.length]/2,.25,'triangle',.03)},260)}audioBtn.onclick=()=>music(!S.audio);
function icon(t){return{battle:'⚔',elite:'☠',rest:'🔥',treasure:'💎',shop:'🛒',boss:'👑'}[t]||'•'}function log(m){S.logs=[m,...S.logs].slice(0,6)}function hud(){title.textContent=S.screen==='combat'?'Combat':S.screen[0].toUpperCase()+S.screen.slice(1);hp.textContent=`❤ ${S.hp}/${S.maxHp}`;gold.textContent=`💰 ${S.gold}`;deck.textContent=`🃏 ${S.deck.length}`;act.textContent=`Act ${S.act}`}
const px={hero:'0000002222000000000022222200000002333332000000231311320000023333333200000224444220000022444422000002224442220000222444422200002244444422000022404404220000220044002200002200000022000002000000200000',goblin:'0000000000000000000022222000000002222222000000231313200000023333332000002244442200000222444422000002244442200000024444200000002404200000002202200000002000200000000000000000000000000',bat:'2000000000000000220000000000002222200000000222222220000022223131222220002233333322000000224444220000000024420000000000242000000000000000000000000000000000000000',slime:'0000000000000000000002220000000000222222000000022222220000002312231200000233333332000002334443320000002333320000000022220000000000000000000000000000000000000',bandit:'0000002222000000000022222200000002333332000000231111320000023333333200000244444420000024444442000002244442200000024040200000002202200000002000200000000000000000000000000',knight:'0000002222000000000222222200000002333332000000231111320000023333333200000224444220000022444422000002244442200000022042200000002202200000002000200000000000000000000000000',bone:'0000002222000000000222222200000002311132000000233333320000002233332200000002444200000002244220000000222220000000022022000000002000200000000000000000000000000',slimeboss:'0000222222220000002222222220000022231221322000023333333332000023344443320000023333333320000002333332000000002222200000000000000000000000000000000000000000',warden:'0000002222000000000222222200000022333332200000231111320000023333333200000244444420000024444442000002244442200000022042200000002202200000002000200000000000000000000000000',hydra:'0000200020000000002220222000000022222222200000231323132000023333333320000024444442000000244444200000002222200000000222200000000020020000000000000000000000000000',tyrant:'0000002222000000000222222200000002111120000000233333320000023344433200000234444320000023344433200000233333320000002202200000002202200000002000200000000000000000000000000'};
function sprite(k,cls=''){let pal={hero:['#facc15','#7c2d12','#fef3c7','#fb7185'],goblin:['#84cc16','#166534','#ecfccb','#f97316'],bat:['#a78bfa','#4c1d95','#ddd6fe','#111827'],slime:['#22d3ee','#0e7490','#ecfeff','#a7f3d0'],bandit:['#94a3b8','#1e293b','#e2e8f0','#f43f5e'],knight:['#94a3b8','#334155','#e2e8f0','#f43f5e'],bone:['#fef3c7','#78350f','#fff7ed','#dc2626'],slimeboss:['#67e8f9','#155e75','#ecfeff','#bef264'],warden:['#f0abfc','#701a75','#fdf4ff','#f97316'],hydra:['#34d399','#065f46','#d1fae5','#f472b6'],tyrant:['#f59e0b','#78350f','#fef3c7','#60a5fa']}[k]||['#fff','#333','#ddd','#f00'];let s=px[k]||px.hero,rect='';for(let i=0;i<s.length;i++){let v=+s[i];if(v)rect+=`<rect x="${i%16*8}" y="${Math.floor(i/16)*8}" width="8" height="8" fill="${pal[v-1]}"/>`}return`<div class="sprite ${cls}" style="--glow:${pal[0]}"><svg viewBox="0 0 128 128" shape-rendering="crispEdges">${rect}</svg></div>`}

function draw(n){for(let i=0;i<n;i++){if(!S.draw.length&&S.discard.length){S.draw=sh(S.discard);S.discard=[];log('Discard reshuffled.')}if(!S.draw.length)break;S.hand.push(S.draw.shift())}S.hand=S.hand.slice(0,10)}

function enemyIntent(){let e=S.enemy;if(!e)return{label:''};let n=S.map.map[S.node],base=n.type==='boss'?18:n.type==='elite'?13:9;if(S.turn%4===0&&['knight','warden','tyrant'].includes(e.kind))return{type:'block',amount:12,label:'Guards'};if(S.turn%3===0&&['slime','slimeboss','hydra'].includes(e.kind))return{type:'debuff',amount:1,label:'Debuffs'};return{type:'attack',amount:Math.round(base*(1+(S.act-1)*.25)),label:`Attacks ${Math.round(base*(1+(S.act-1)*.25))}`}}
function play(id){if(S.busy)return;let c=S.hand.find(x=>x.id===id);if(!c||S.energy<c.cost||!S.enemy)return;tone(c.type==='attack'?330:260,.07);S.energy-=c.cost;S.hand=S.hand.filter(x=>x.id!==id);if(!c.exhaust)S.discard.push(c);let dmg=0;if(c.block)S.block+=c.block;if(c.heal)S.hp=Math.min(S.maxHp,S.hp+c.heal);if(c.str)S.str+=c.str;if(c.burn)S.burn+=c.burn;if(c.weak)S.weak+=c.weak;if(c.draw)draw(c.draw);if(c.dmg){dmg=(c.dmg+S.str)*(c.hits||1);S.enemy.hp=Math.max(0,S.enemy.hp-dmg);S.hitEnemy=true;tone(90,.08,'sawtooth',.06);setTimeout(()=>{S.hitEnemy=false;render()},260)}log(`${c.name}${dmg?' hits '+dmg:''}.`);if(S.enemy.hp<=0)setTimeout(winCombat,280);render()}

function endTurnAction(){if(S.busy||!S.enemy)return;S.busy=true;tone(180,.06);S.discard.push(...S.hand);S.hand=[];if(S.burn>0){S.enemy.hp=Math.max(0,S.enemy.hp-S.burn);log(`Burn deals ${S.burn}.`);S.burn=Math.max(0,S.burn-1);if(S.enemy.hp<=0){render();setTimeout(winCombat,260);return}}let it=enemyIntent();render();setTimeout(()=>{if(!S.enemy)return;if(it.type==='attack'){let raw=S.weak?Math.floor(it.amount*.75):it.amount,hit=Math.max(0,raw-S.block);S.hp=Math.max(0,S.hp-hit);S.hitHero=true;tone(70,.1,'sawtooth',.07);log(`${S.enemy.name} hits for ${hit}.`);setTimeout(()=>{S.hitHero=false;render()},240);if(S.hp<=0){S.screen='dead';S.busy=false;render();return}}else if(it.type==='debuff'){S.weak++;log(`${S.enemy.name} applies Weak.`);tone(160,.1,'triangle')}else{S.enemy.hp=Math.min(S.enemy.maxHp,S.enemy.hp+0);log(`${S.enemy.name} guards.`)}S.weak=Math.max(0,S.weak-1);S.block=0;S.energy=3;S.turn++;draw(5);S.busy=false;render()},520)}
function addReward(id){let c=S.reward.find(x=>x.id===id);if(c)S.deck.push(c);completeNode()}function buy(id){let c=S.shop.find(x=>x.id===id);if(!c||S.gold<c.price)return;S.gold-=c.price;S.deck.push({...c,id:ID()});S.shop=S.shop.filter(x=>x.id!==id);tone(440,.08);log(`Bought ${c.name}.`);render()}
function render(){hud();let m=$('#main');if(S.screen==='start'){m.innerHTML=`<section class="start"><div class="panel">${sprite('hero','float')}<div class="logo">PIXEL<br>ASPIRE V2</div><p class="muted">3-act mobile roguelike deckbuilder με connected paths, 16-bit sprites, music και SFX.</p><button class="btn" id="start">Start Run</button></div></section>`;$('#start').onclick=startRun;return}if(S.screen==='map'){let lines=S.map.edges.map(e=>{let a=S.map.map[e.from],b=S.map.map[e.to],ok=a.done||a.available;return`<line x1="${a.x}" y1="${100-a.y}" x2="${b.x}" y2="${100-b.y}" stroke="${ok?'rgba(251,191,36,.52)':'rgba(148,163,184,.25)'}" stroke-width="1.4"/>`}).join('');let nodes=S.map.nodes.map(n=>`<button class="node ${n.available&&!n.done?'av':''} ${n.done?'done':''} ${S.node===n.id?'cur':''} ${!n.available&&!n.done?'lock':''}" data-node="${n.id}" style="left:${n.x}%;top:${100-n.y}%" ${(!n.available||n.done)?'disabled':''}>${icon(n.type)}</button>`).join('');m.innerHTML=`<div class="panel"><b>Act ${S.act}: choose a path</b><p class="muted">Μόνο οι φωτεινοί κόμβοι είναι reachable. Τα paths κρατάνε κανονικό progression μέχρι boss.</p><div class="mapbox"><svg viewBox="0 0 100 100" style="position:absolute;inset:0;width:100%;height:100%">${lines}</svg>${nodes}</div><div class="legend">${['battle','elite','rest','treasure','shop','boss','done','reachable'].map(t=>`<div><span style="font-size:18px">${t==='done'?'✓':t==='reachable'?'◎':icon(t)}</span><br>${t}</div>`).join('')}</div></div>`;$$('[data-node]').forEach(b=>b.onclick=()=>chooseNode(b.dataset.node));return}if(S.screen==='combat'&&S.enemy){let it=enemyIntent();m.innerHTML=`<div class="battle"><div class="arena"><div class="units"><div class="unit ${S.hitHero?'hit':''}">${sprite('hero')}<div class="bar"><span style="width:${S.hp/S.maxHp*100}%"></span></div><div class="stats">HP ${S.hp}/${S.maxHp} · Block ${S.block} · STR ${S.str} · Weak ${S.weak}</div></div><div class="unit enemy ${S.hitEnemy?'hit':''}">${sprite(S.enemy.kind)}<div class="name">${S.enemy.name}</div><div class="bar"><span style="width:${S.enemy.hp/S.enemy.maxHp*100}%"></span></div><div class="stats">HP ${S.enemy.hp}/${S.enemy.maxHp} · Burn ${S.burn}</div><div class="intent">Intent: ${it.label}</div></div></div><div class="mini"><div>⚡ ${S.energy}/3</div><div>Turn ${S.turn}</div><div>Draw ${S.draw.length}</div><div>Discard ${S.discard.length}</div></div><div class="log">${S.logs.map(x=>`<div>${x}</div>`).join('')}</div></div><div class="hand">${S.hand.map(c=>card(c,S.energy<c.cost||S.busy)).join('')}</div><button class="btn" id="turnBtn" style="background:${S.busy?'#64748b':'#d946ef'}" ${S.busy?'disabled':''}>End Turn</button></div>`;$$('[data-card]').forEach(b=>b.onclick=()=>play(b.dataset.card));$('#turnBtn').onclick=endTurnAction;return}if(S.screen==='reward'){m.innerHTML=`<div class="panel"><h2>Choose a card</h2><div class="rowcards">${S.reward.map(c=>card(c)).join('')}</div><button class="btn2" id="skip">Skip</button></div>`;$$('[data-card]').forEach(b=>b.onclick=()=>addReward(b.dataset.card));$('#skip').onclick=completeNode;return}if(S.screen==='rest'){m.innerHTML=`<div class="panel" style="text-align:center"><h2>Rest Site 🔥</h2>${sprite('hero','float')}<p class="muted">Heal 30% max HP before climbing.</p><button class="btn" id="rest">Rest</button></div>`;$('#rest').onclick=()=>{S.hp=Math.min(S.maxHp,S.hp+Math.ceil(S.maxHp*.3));tone(300,.1);completeNode()};return}if(S.screen==='treasure'){m.innerHTML=`<div class="panel" style="text-align:center"><h2>Treasure 💎</h2><p class="muted">Gain gold and continue.</p><button class="btn" id="chest">Open Chest</button></div>`;$('#chest').onclick=()=>{let g=R(35,65);S.gold+=g;log(`Found ${g} gold.`);tone(600,.1);completeNode()};return}if(S.screen==='shop'){m.innerHTML=`<div class="panel"><h2>Shop 🛒</h2><p class="muted">Tap a card to buy it.</p><div class="rowcards">${S.shop.map(c=>`<div>${card(c)}<div style="text-align:center;font-weight:950;margin-top:6px">${c.price}g</div></div>`).join('')}</div><button class="btn2" id="leave">Leave</button></div>`;$$('[data-card]').forEach(b=>b.onclick=()=>buy(b.dataset.card));$('#leave').onclick=completeNode;return}if(S.screen==='dead'){m.innerHTML=`<div class="panel dead"><h1>You Died</h1><p class="muted">Act ${S.act}. Deck ${S.deck.length}. Gold ${S.gold}.</p><button class="btn" id="again">New Run</button></div>`;$('#again').onclick=startRun;return}if(S.screen==='clear'){m.innerHTML=`<div class="panel clear"><h1>3 Acts Cleared</h1><p class="muted">You beat Pixel Aspire V2.</p><button class="btn" id="again">New Run</button></div>`;$('#again').onclick=startRun;return}}
function tests(){let d=baseDeck();console.assert(d.length===10,'deck length');console.assert(d.every(x=>x.id),'ids');let mp=makeMap(1);console.assert(mp.nodes.some(n=>n.type==='boss'),'boss');console.assert(mp.nodes.filter(n=>n.row===0).every(n=>n.available),'starts available');console.assert(mp.edges.length>mp.nodes.length*.6,'edges');console.assert(typeof endTurnAction==='function','turn function not shadowed')}tests();render();
</script>
</body>
</html>
